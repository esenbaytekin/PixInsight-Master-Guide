site_name: PixInsight Master Guide
site_description: PixInsight 1.9.3 ve RC Astro eklentileri için Türkçe monokrom astrofotoğraf işleme el kitabı
site_url: https://allsky.com.tr/docs/
use_directory_urls: true
copyright: >-
  PixInsight Master Guide —
  <a href="#__consent">Çerez tercihlerini değiştir</a>
hooks:
  - hooks/build_info.py
theme:
  name: material
  custom_dir: overrides
  logo: assets/images/logo-pmg.png
  language: tr
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search:
      lang: tr

extra_css:
  - stylesheets/extra.css?v=1.0.1

extra:
  analytics:
    provider: google
    property: G-50DME5PLFF
  consent:
    title: Çerez ve analitik tercihleri
    description: >-
      Bu site, dokümantasyonun kullanımını ölçmek ve içeriği geliştirmek
      amacıyla Google Analytics kullanır. Analitik çerezler yalnızca
      onayınızdan sonra etkinleştirilir. Ayrıntılı bilgi için
      <a href="/docs/privacy-and-analytics/">Çerez ve Analitik Bilgilendirmesi</a>
      sayfasını inceleyebilirsiniz.
    cookies:
      analytics:
        name: Google Analytics
        checked: false
    actions:
      - accept
      - reject
      - manage

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true

