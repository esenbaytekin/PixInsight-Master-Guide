<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Allsky Türkiye — Türkçe PixInsight Master Guide dokümantasyonu.">
  <meta name="theme-color" content="#090d16">
  <title>Allsky Türkiye | PixInsight Rehberi</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090d16;
      --surface: #111827;
      --text: #f4f7fb;
      --muted: #a9b4c7;
      --accent: #7dd3fc;
      --accent-strong: #38bdf8;
      --ring: rgba(125, 211, 252, 0.38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background:
        radial-gradient(circle at 50% 5%, rgba(56, 189, 248, 0.13), transparent 38rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 42rem);
      padding: clamp(2rem, 7vw, 4.5rem);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.5rem;
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      box-shadow: 0 2rem 6rem rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .logo-placeholder {
      width: 5.5rem;
      height: 5.5rem;
      margin: 0 auto 1.75rem;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 8vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.045em;
    }

    p {
      max-width: 32rem;
      margin: 1.25rem auto 2rem;
      color: var(--muted);
      font-size: clamp(1rem, 3vw, 1.15rem);
      line-height: 1.7;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 3rem;
      padding: 0.75rem 1.35rem;
      border-radius: 0.75rem;
      background: var(--accent);
      color: #07111d;
      font-weight: 750;
      text-decoration: none;
      transition: background-color 160ms ease, transform 160ms ease;
    }

    .button:hover { background: var(--accent-strong); transform: translateY(-1px); }
    .button:focus-visible { outline: 3px solid var(--ring); outline-offset: 4px; }

    small {
      display: block;
      margin-top: 1.5rem;
      color: #7d899d;
    }

    @media (prefers-reduced-motion: reduce) {
      .button { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <svg class="logo-placeholder" viewBox="0 0 96 96" role="img" aria-labelledby="logo-title logo-desc">
      <title id="logo-title">Allsky logo yer tutucusu</title>
      <desc id="logo-desc">Gerçek marka logosu eklenene kadar kullanılan yıldız ve gökyüzü simgesi.</desc>
      <circle cx="48" cy="48" r="43" fill="none" stroke="currentColor" stroke-width="3" opacity="0.7"/>
      <path d="M48 18l6.1 18.4L73 42.2 57.7 53.5 58.2 73 48 61.8 37.8 73l.5-19.5L23 42.2l18.9-5.8z" fill="currentColor" opacity="0.92"/>
    </svg>
    <h1>Allsky Türkiye</h1>
    <p>Türkçe PixInsight Master Guide; kalibrasyondan renk yönetimine, gradient düzeltmeden final işleme kadar yaşayan teknik dokümantasyon sunar.</p>
    <a class="button" href="/docs/">PixInsight rehberini aç</a>
    <small>Logo görseli geçici bir yer tutucudur.</small>
  </main>
</body>
</html>
